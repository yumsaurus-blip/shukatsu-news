name: 毎朝のニュース更新

on:
  schedule:
    # UTC 21:00 は日本時間の翌朝 6:00
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news-update
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python 3.12 を準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージをインストール
        run: python -m pip install -r scripts/requirements.txt

      - name: ニュースを収集・要約
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/collect.py

      - name: 生成データをコミット
        shell: bash
        run: |
          if git diff --quiet -- docs/data; then
            echo "更新はありません。"
            exit 0
          fi
          git config user.name "shukatsu-news-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data
          git commit -m "ニュースを更新: $(TZ=Asia/Tokyo date +%F)"
          git push

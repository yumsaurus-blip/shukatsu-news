<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1a73e8">
    <meta name="description" content="就活生が毎朝押さえておきたいニュースを3分で読めるPWA">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./style.css">
    <title>シューカツタイムズ</title>
  </head>
  <body>
    <a class="skip-link" href="#articles">記事一覧へ移動</a>
    <header class="app-header">
      <div class="brand-row">
        <div>
          <p class="eyebrow">3分で、面接の話題を。</p>
          <h1>シューカツタイムズ</h1>
        </div>
        <span class="edition" aria-label="毎朝6時更新">朝刊</span>
      </div>
      <nav class="date-nav" aria-label="ニュースの日付">
        <button id="older-button" type="button" aria-label="前の日へ">←</button>
        <div>
          <time id="current-date">読み込み中</time>
          <span id="update-time" class="update-time"></span>
        </div>
        <button id="newer-button" type="button" aria-label="次の日へ">→</button>
      </nav>
    </header>

    <main>
      <section class="digest-card" aria-labelledby="digest-title">
        <div class="section-label">今日の要約</div>
        <h2 id="digest-title">今日の3行まとめ</h2>
        <ol id="daily-digest">
          <li>ニュースを読み込んでいます。</li>
        </ol>
      </section>

      <section class="article-section" aria-labelledby="articles-title">
        <div class="article-heading">
          <div>
            <p class="section-label">注目ニュース</p>
            <h2 id="articles-title">今日のニュース</h2>
          </div>
          <span id="article-count" class="count">0件</span>
        </div>
        <div id="category-filter" class="chips" role="group" aria-label="カテゴリで絞り込み"></div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="articles" class="article-list"></div>
      </section>
    </main>

    <footer>
      <p>RSSのタイトルと概要をAIが要約しています。重要な判断では必ず出典をご確認ください。</p>
    </footer>
    <script src="./app.js" defer></script>
  </body>
</html>
